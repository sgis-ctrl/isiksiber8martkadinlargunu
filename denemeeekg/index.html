  <canvas id="bgCanvas"></canvas>

  <div id="ui-layer">
    <div id="intro-box">
      <h2 class="intro-text" id="intro-msg"></h2>
    </div>

    <div id="action-area" style="display: none;">
      <div class="input-container">
        <input type="text" id="nameInput" placeholder="Bir isim yaz..." maxlength="40" autocomplete="off">
        <button id="submitBtn">Gönder</button>
      </div>
    </div>

  </div>

  <!-- Messages outside ui-layer so position:fixed works correctly -->
  <div class="messages" id="message-area">
    <p class="personal-message" id="personal-msg"></p>
    <p class="commemorative-message">
      “Bugün aramızda olmayan, hayatları yarım kalan tüm kadınları sevgi ve saygıyla anıyoruz. Anılarıyla 8
      Mart Dünya Kadınlar Günü’nü kalplerimizde yaşatıyoruz.”
    </p>
  </div>

  <div class="night"></div>
